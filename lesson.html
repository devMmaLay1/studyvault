<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault — Interactive Lesson</title>

    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#2d5be3">
    <link rel="icon" href="assets/icons/studyvault-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/lesson.css">
    <link rel="stylesheet" href="assets/css/lesson-diagrams.css">

    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/lesson-diagrams.js"></script>
    <script src="assets/js/lessons/CIT108_m2_u3.js"></script>
    <script src="assets/js/lesson-engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (window.lucide) lucide.createIcons();
        });
    </script>

</html>
